<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Prediction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:500px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        label{
            font-weight:bold;
        }

        input{
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            margin-top:10px;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Vehicle Insurance Prediction</h1>

    <form method="POST" action="/">

        <label>Gender (1 = Male, 0 = Female)</label>
        <input type="number" name="Gender" min="0" max="1" required>

        <label>Age</label>
        <input type="number" name="Age" required>

        <label>Driving License (1 = Yes, 0 = No)</label>
        <input type="number" name="Driving_License" min="0" max="1" required>

        <label>Region Code</label>
        <input type="number" step="0.01" name="Region_Code" required>

        <label>Previously Insured (1 = Yes, 0 = No)</label>
        <input type="number" name="Previously_Insured" min="0" max="1" required>

        <label>Annual Premium</label>
        <input type="number" step="0.01" name="Annual_Premium" required>

        <label>Policy Sales Channel</label>
        <input type="number" step="0.01" name="Policy_Sales_Channel" required>

        <label>Vintage</label>
        <input type="number" name="Vintage" required>

        <label>Vehicle Age &lt; 1 Year</label>
        <input type="number" name="Vehicle_Age_lt_1_Year" min="0" max="1" required>

        <label>Vehicle Age &gt; 2 Years</label>
        <input type="number" name="Vehicle_Age_gt_2_Years" min="0" max="1" required>

        <label>Vehicle Damage (1 = Yes, 0 = No)</label>
        <input type="number" name="Vehicle_Damage_Yes" min="0" max="1" required>

        <button type="submit">Predict</button>

    </form>

    {% if context %}
    <div class="result">
        Prediction: {{ context }}
    </div>
    {% endif %}

</div>

</body>
</html>
